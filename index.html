<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- interactive-widget=resizes-content asks the browser to shrink the
         layout viewport when the on-screen keyboard opens, so fixed-position
         UI stays visible above it (Chrome/Android honor it; iOS Safari
         ignores it today, which is why the search sheet also anchors its
         input to the TOP of the screen - see SearchSheet.tsx). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Your European Travel Companion - offline-ready map of points of interest and walking tours." />
    <title>Waypoints</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
