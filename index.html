<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Installed-PWA polish: black-translucent lets the map render UNDER
         the iOS status bar (clock/battery float over the map, like Apple
         Maps) instead of iOS reserving an opaque bar above the app. Only
         affects standalone/home-screen mode; Safari-in-browser ignores it. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Tints Safari's own top/bottom chrome to blend with the app instead
         of rendering as hard dark slabs (values mirror the light/dark
         --glass-fill-opaque tokens). The PWA manifest keeps the blue brand
         theme_color for install surfaces. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8f9fb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1c1c1e" />
    <meta name="description" content="Your European Travel Companion - offline-ready map of points of interest and walking tours." />
    <title>Waypoints</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
